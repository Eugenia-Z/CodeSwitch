# Conda environment for CodeSwitch (PyTorch installed separately — see README).
name: cs
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip>=23
  - pip:
      # Keep in sync with package lines in requirements.txt (torch is omitted on purpose).
      - transformers>=4.35.0
      - sentencepiece>=0.1.99
      - datasets>=2.14.0
      - huggingface_hub>=0.17.0
      - scikit-learn>=1.3.0
      - numpy>=1.24.0
      - pandas>=2.0.0
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      - tqdm>=4.65.0
